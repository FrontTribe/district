# NGINX Configuration for boutique.district.hr
# This file should be placed in /etc/nginx/sites-available/ and symlinked to sites-enabled
# File name: boutique.district.hr.conf or district.hr.conf for wildcard subdomains

server {
    listen 80;
    listen [::]:80;
    server_name boutique.district.hr;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name boutique.district.hr;

    # SSL Configuration - Update paths to your actual SSL certificates
    ssl_certificate /etc/letsencrypt/live/boutique.district.hr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boutique.district.hr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Logging
    access_log /var/log/nginx/boutique.district.hr.access.log;
    error_log /var/log/nginx/boutique.district.hr.error.log;

    # Proxy to Next.js app running on port 3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Proxy Next.js static files and images
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }

    location /_next/image/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 1y;
    }

    # Client max body size for uploads
    client_max_body_size 50M;
}

# Alternative: Wildcard configuration for all subdomains
# Use this instead if you want one config for all tenants (boutique, momento, etc.)

