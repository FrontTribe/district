name: Deploy District Project

on:
  push:
    branches: [main, development]

jobs:
  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║ 1. Migration sanity check (gates the deploy)                            ║
  # ║    - Boots a throwaway Postgres                                          ║
  # ║    - Applies every committed migration (catches broken SQL)             ║
  # ║    - Asks Payload to generate a fresh migration; if a new file appears  ║
  # ║      a developer changed the schema but forgot to commit the migration  ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  migration-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: district_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URI: postgres://postgres:postgres@localhost:5432/district_ci
      PAYLOAD_SECRET: ci-only-not-a-real-secret
      PAYLOAD_DB_PUSH: 'false'
      NODE_ENV: development

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -U postgres && exit 0
            sleep 1
          done
          echo "Postgres never became ready" >&2
          exit 1

      - name: Show pending migrations
        run: pnpm payload migrate:status || true

      - name: Apply committed migrations
        run: pnpm payload migrate

      - name: Detect schema drift (missing migration)
        run: |
          set -e

          # Snapshot working tree before asking Payload to diff schema
          BEFORE_TRACKED=$(git diff --name-only -- src/migrations | wc -l)
          BEFORE_UNTRACKED=$(git ls-files --others --exclude-standard src/migrations | wc -l)

          # --skip-empty: if there's no schema diff, no file is created
          pnpm payload migrate:create --skip-empty schema-drift-check || true

          AFTER_TRACKED=$(git diff --name-only -- src/migrations | wc -l)
          AFTER_UNTRACKED=$(git ls-files --others --exclude-standard src/migrations | wc -l)

          if [ "$AFTER_TRACKED" -gt "$BEFORE_TRACKED" ] || [ "$AFTER_UNTRACKED" -gt "$BEFORE_UNTRACKED" ]; then
            echo "::error title=Missing migration::Schema drift detected. Run 'pnpm payload migrate:create <name>' locally and commit the result."
            git status --short src/migrations
            exit 1
          fi
          echo "✓ No schema drift — migrations folder matches code."

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║ 2. Build + ship the standalone bundle                                   ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  deploy:
    needs: migration-check
    runs-on: ubuntu-latest

    steps:
      # ── 1. Resolve branch → deploy target ──────────────────────────────────
      - name: Set deploy target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "path=/var/www/district-prod" >> $GITHUB_OUTPUT
            echo "app=district-prod"           >> $GITHUB_OUTPUT
            echo "port=3000"                   >> $GITHUB_OUTPUT
          else
            echo "path=/var/www/district-dev"  >> $GITHUB_OUTPUT
            echo "app=district-dev"            >> $GITHUB_OUTPUT
            echo "port=3001"                   >> $GITHUB_OUTPUT
          fi

      # ── 2. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 3. Setup pnpm + Node (build happens on the fast GH runner, not server)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── 4. Install ──────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Write .env.local for build ───────────────────────────────────────
      #    Only NEXT_PUBLIC_* vars are strictly needed at build time (they get
      #    baked into the JS bundle). Runtime vars (DB, secrets) stay on server.
      - name: Write build env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            cat <<'EOF' > .env.local
          NEXT_PUBLIC_ROOT_DOMAIN=${{ secrets.NEXT_PUBLIC_ROOT_DOMAIN }}
          NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL_PROD }}
          NEXT_PUBLIC_PAYLOAD_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL_PROD }}
          NEXT_PUBLIC_DEV_ROOT_DOMAIN=dev.district.hr
          NEXT_PUBLIC_RENTLIO_API_KEY=${{ secrets.NEXT_PUBLIC_RENTLIO_API_KEY }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          EOF
          else
            cat <<'EOF' > .env.local
          NEXT_PUBLIC_ROOT_DOMAIN=${{ secrets.NEXT_PUBLIC_ROOT_DOMAIN }}
          NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL_DEV }}
          NEXT_PUBLIC_PAYLOAD_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL_DEV }}
          NEXT_PUBLIC_DEV_ROOT_DOMAIN=dev.district.hr
          NEXT_PUBLIC_RENTLIO_API_KEY=${{ secrets.NEXT_PUBLIC_RENTLIO_API_KEY }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          EOF
          fi

      # ── 6. Build on GitHub runner (7 GB RAM, free) ──────────────────────────
      - name: Build
        run: NODE_ENV=production pnpm build

      # ── 7. Assemble standalone artifact ─────────────────────────────────────
      #    output: standalone bundles its own minimal node_modules.
      #    Static assets + public must be copied in manually.
      - name: Prepare standalone
        run: |
          cp -r public         .next/standalone/public
          cp -r .next/static   .next/standalone/.next/static

      # ── 8. Package ──────────────────────────────────────────────────────────
      - name: Package artifact
        run: tar -czf deploy.tgz -C .next/standalone .

      # ── 9. Upload to server ──────────────────────────────────────────────────
      - name: Upload artifact
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          source: deploy.tgz
          target: /tmp/

      # ── 10. Extract + restart ────────────────────────────────────────────────
      #
      # Stability notes:
      # - PAYLOAD_RUN_MIGRATIONS_ON_BOOT=true makes Payload apply any pending
      #   migrations during connect() (see node_modules/@payloadcms/db-postgres/
      #   dist/connect.js). Idempotent: already-applied migrations are skipped
      #   based on the payload_migrations table.
      # - If the boot fails because of a migration error, pm2 will keep
      #   restart-looping the new process. Check `pm2 logs <APP_NAME>` first.
      # - FIRST-TIME BASELINE (one-time, do this manually before the first
      #   deploy on a DB that was originally bootstrapped with push:true):
      #     psql "$DATABASE_URI" <<'SQL'
      #       CREATE TABLE IF NOT EXISTS payload_migrations (
      #         id serial PRIMARY KEY,
      #         name varchar,
      #         batch numeric,
      #         updated_at timestamp(3) with time zone DEFAULT now() NOT NULL,
      #         created_at timestamp(3) with time zone DEFAULT now() NOT NULL
      #       );
      #       INSERT INTO payload_migrations (name, batch)
      #       VALUES ('20260407_133034', 1)
      #       ON CONFLICT DO NOTHING;
      #     SQL
      #   Otherwise the first auto-migrate will try to CREATE TABLE on a DB
      #   that already has those tables and the new process will crash.
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          timeout: 5m
          script_stop: true
          script: |
            set -euxo pipefail

            DEPLOY_PATH="${{ steps.target.outputs.path }}"
            APP_NAME="${{ steps.target.outputs.app }}"
            APP_PORT="${{ steps.target.outputs.port }}"

            # Stop old process before touching files to avoid serving half-deleted builds
            pm2 delete "$APP_NAME" > /dev/null 2>&1 || true

            # Cleanup legacy production aliases so an old process definition does not restart-loop.
            if [ "$APP_NAME" = "district-prod" ]; then
              pm2 delete district > /dev/null 2>&1 || true
              pm2 delete distric > /dev/null 2>&1 || true
            fi

            # Backup env files before wiping
            for env_file in .env .env.local .env.production; do
              if [ -f "$DEPLOY_PATH/$env_file" ]; then
                cp "$DEPLOY_PATH/$env_file" "/tmp/$(basename $env_file).bak"
              fi
            done

            # Force permissions then wipe contents (can't remove the dir itself)
            mkdir -p "$DEPLOY_PATH"
            chmod -R u+rwX "$DEPLOY_PATH" 2>/dev/null || true
            find "$DEPLOY_PATH" -mindepth 1 -delete 2>/dev/null || rm -rf "$DEPLOY_PATH"/* "$DEPLOY_PATH"/.[!.]* 2>/dev/null || true

            # Extract standalone artifact into clean dir
            tar -xzf /tmp/deploy.tgz -C "$DEPLOY_PATH"
            rm -f /tmp/deploy.tgz

            # Restore env files
            for env_file in .env .env.local .env.production; do
              if [ -f "/tmp/$(basename $env_file).bak" ]; then
                cp "/tmp/$(basename $env_file).bak" "$DEPLOY_PATH/$env_file"
                rm -f "/tmp/$(basename $env_file).bak"
              fi
            done

            # Standalone builds must be started with Node against the generated entrypoint
            test -f "$DEPLOY_PATH/server.js"
            PORT="$APP_PORT" NODE_ENV=production PAYLOAD_DB_PUSH=false PAYLOAD_RUN_MIGRATIONS_ON_BOOT=true pm2 start \
              "$DEPLOY_PATH/server.js" \
              --name "$APP_NAME" \
              --cwd  "$DEPLOY_PATH" \
              --update-env

            pm2 save
            echo "✓ $APP_NAME deployed on port $APP_PORT"
